name: rclone
display_name: RClone
description: A plugin for Rclone integration with various cloud storage services.
homepage: https://github.com/PlakarKorp/integrations/tree/main/rclone
license: isc
connectors:
  - type: importer
    executable: rclone-importer
    protocols: ['rclone']
  - type: exporter
    executable: rclone-exporter
    protocols: ['rclone']
  - type: storage
    executable: rclone-storage
    protocols: ['rclone']
